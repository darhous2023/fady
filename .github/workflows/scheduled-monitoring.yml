name: Scheduled production monitoring

# Station 8: catches what Sentry alone won't -- a route/API returning a
# controlled-but-wrong status, or a hotlinked manufacturer image going dead
# (404, DNS failure, hotlink-protection block) with zero thrown exception.
# Needs no secrets: every check here hits the real public site the same way
# a visitor's browser already does.
on:
  schedule:
    # 06:00 UTC daily (~08:00 Cairo) -- once a day is enough signal without
    # being an inconsiderate amount of daily traffic to third-party
    # manufacturer image hosts.
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Route health check (static + dynamic routes, real production)
        run: npm run routes:check

      - name: Image URL health check (real production pages + hotlinked images)
        run: npx tsx scripts/image-url-health-check.ts
